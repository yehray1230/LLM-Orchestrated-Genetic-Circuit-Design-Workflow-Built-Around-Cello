<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Genetic Circuit Studio{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">Genetic Circuit<br>Research Studio</div>
      <nav class="nav">
        <a href="/web" class="{{ 'active' if active_path == '/web' or active_path == '/' else '' }}">Dashboard</a>
        <a href="/web/new-design" class="{{ 'active' if active_path == '/web/new-design' else '' }}">New Design</a>
        <a href="/web/runs" class="{{ 'active' if active_path.startswith('/web/runs') else '' }}">Runs</a>
        <a href="/web/imports" class="{{ 'active' if active_path.startswith('/web/imports') else '' }}">External Imports</a>
        <a href="/web/designs" class="{{ 'active' if active_path.startswith('/web/designs') else '' }}">Design Library</a>
        <a href="/web/research" class="{{ 'active' if active_path.startswith('/web/research') else '' }}">Research Workspace</a>
        <a href="/web/benchmarks" class="{{ 'active' if active_path.startswith('/web/benchmarks') else '' }}">Benchmarks</a>
        <a href="/web/compare" class="{{ 'active' if active_path == '/web/compare' else '' }}">Compare</a>
        <a href="/docs">API Docs</a>
        <a href="http://127.0.0.1:8501">Streamlit</a>
      </nav>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
