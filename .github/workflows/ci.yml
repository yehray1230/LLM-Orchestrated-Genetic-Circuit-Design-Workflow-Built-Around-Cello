name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      MPLBACKEND: Agg
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify generated registries
        run: python src/scripts/build_registry.py --check

      - name: Verify llms-full.txt is up-to-date
        run: |
          python src/scripts/generate_llms_txt.py
          git diff --exit-code llms-full.txt

      - name: Run Ruff
        run: python -m ruff check . --exclude venv,tmp_pytest,outputs,chroma_db,_docx_extract_tmp

      - name: Run tests
        run: python -m pytest
